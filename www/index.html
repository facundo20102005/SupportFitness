<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#1a73e8">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <title>Visitas Técnicas - Support Fitness</title>
    <link rel="icon" href="assets/logo.jpeg">
    <link rel="stylesheet" href="style.css">
    <script src="nav.js"></script>
    <script src="app.js" defer></script>
</head>
<body>

    <!-- ===== FORMULARIO TÉCNICOS ===== -->
    <main class="layout-principal vista" id="vista-formulario">
        <div class="container">

            <button id="btn-historial-movil" class="btn-submit"
                    style="display:none; margin-top:0; margin-bottom:20px; background:#e8f0fe; color:#1a73e8;" disabled>
                ⏳ Cargando historial...
            </button>

            <form id="visitaForm" onsubmit="return false;">

                <div class="card" id="card-tecnico" style="margin-bottom:25px;">
                    <h3>Técnico *</h3>
                    <input type="text" id="tecnico" placeholder="Tu nombre" required autocomplete="name">
                </div>

                <div class="card" id="card-gimnasio" style="margin-bottom:25px;">
                    <h3>Gimnasio *</h3>
                    <div class="buscador-container">
                        <div id="ghost"></div>
                        <input type="text" id="buscador" placeholder="Buscar gimnasio..."
                               oninput="filtrar()" onfocus="filtrar()" autocomplete="off" inputmode="search">
                    </div>
                    <div id="lista"></div>
                    <label style="display:block; margin-top:12px; font-size:13px; color:#5f6368; font-weight:600;">
                        ¿No está en la lista? Escribilo acá:
                    </label>
                    <input type="text" id="otroGimnasio" placeholder="Nombre del gimnasio">
                </div>

                <div class="card" id="card-motivo" style="margin-bottom:25px;">
                    <h3>Motivo de Visita *</h3>
                    <label class="motivo-label">
                        <input type="checkbox" value="Preventivo" class="motivo"> Mantenimiento Preventivo
                    </label>
                    <label class="motivo-label">
                        <input type="checkbox" value="No Programado" class="motivo"> Mantenimiento no Programado
                    </label>
                    <label class="motivo-label">
                        <input type="checkbox" value="Reparación" class="motivo"> Reparación
                    </label>
                    <label class="motivo-label">
                        <input type="checkbox" value="Revisión de Reparación" class="motivo"> Revisión de Reparación
                    </label>
                    <label style="display:block; margin-top:15px; font-size:13px; color:#5f6368; font-weight:600;">
                        Otros motivos o detalle de las reparaciones:
                    </label>
                    <div id="contenedor-otros-motivos"
                         style="display:flex; flex-direction:column; gap:8px; margin-bottom:10px; margin-top:8px;"></div>
                    <div style="display:flex; gap:8px; align-items:center;">
                        <input type="text" id="input-otro-motivo" placeholder="Escribir y tocar + o Enter (Ej: Cinta polea)"
                               style="flex:1; margin-top:0; padding:12px; border:1.5px solid #1a73e8; border-radius:8px;"
                               onkeydown="if(event.key==='Enter'){event.preventDefault();agregarOtroMotivo();}">
                        <button type="button" onclick="agregarOtroMotivo()"
                                style="background:#1a73e8; color:white; border:none; border-radius:8px;
                                       padding:0 16px; height:45px; font-weight:bold; font-size:24px; cursor:pointer;">+</button>
                    </div>
                    <input type="hidden" id="otroMotivo" value="">
                </div>

                <div class="card">
                    <h3>¿Necesita reparación?</h3>
                    <label class="reparacion-label">
                        <input type="radio" name="reparacion" value="Si"> Sí
                    </label>
                    <label class="reparacion-label">
                        <input type="radio" name="reparacion" value="No" checked> No
                    </label>
                    <div id="box-tapizado" style="display:none; margin-top:14px; padding-top:14px; border-top:1px dashed #dadce0;">
                        <h3 style="color:#1a73e8;">¿Necesita tapizado?</h3>
                        <label class="reparacion-label">
                            <input type="radio" name="tapizado" value="Si"> Sí
                        </label>
                        <label class="reparacion-label">
                            <input type="radio" name="tapizado" value="No" checked> No
                        </label>
                    </div>
                </div>

                <div class="card" id="card-archivo">
                    <h3>📸 Fotos de Remito / Visita</h3>
                    <input type="file" id="archivo-oculto" multiple accept="image/*,.pdf" style="display:none;">
                    <button type="button" class="btn-archivo"
                            onclick="document.getElementById('archivo-oculto').click()">
                        📁 Agregar Fotos o Archivos
                    </button>
                    <div id="lista-archivos" style="margin-top:14px;"></div>
                </div>

                <button type="button" id="btnEnviar" class="btn-submit" onclick="validarYEnviar()">
                    ✅ Enviar Visita Técnica
                </button>

            </form>
            <div id="status" class="status"></div>
        </div>
    </main>

    <!-- ===== MODAL HISTORIAL ANUAL ===== -->
    <div id="modalRegistro" class="modal-overlay">
        <div class="modal-content">
            <div class="modal-header">
                <button class="cal-nav-btn" id="btn-prev" onclick="cambiarAño(-1)">◀</button>
                <h2 id="modal-titulo" style="margin:0; font-size:20px; color:#1a73e8;">PERIODO</h2>
                <button class="cal-nav-btn" id="btn-next" onclick="cambiarAño(1)">▶</button>
                <span class="close-btn" onclick="cerrarRegistro()"
                      style="position:relative; top:0; right:0; margin-left:auto;">&times;</span>
            </div>
            <div id="contenido-registro"></div>
        </div>
    </div>

    <!-- ===== MODALES GENÉRICOS ===== -->
    <div id="modalActualizacion" class="modal-sistema">
        <div class="modal-sistema-box">
            <div class="modal-sistema-titulo" style="color:#1a73e8;">💡 Actualización Disponible</div>
            <div class="modal-sistema-msg">Hay una nueva versión con mejoras. ¿Querés descargarla ahora?</div>
            <div class="modal-sistema-btns">
                <button onclick="document.getElementById('modalActualizacion').style.display='none'"
                        class="btn-modal-secundario">Cancelar</button>
                <a id="linkDescargaApk" href="#" class="btn-modal-primario">⬇️ Actualizar</a>
            </div>
        </div>
    </div>

    <div id="modalConfirmacion" class="modal-sistema">
        <div class="modal-sistema-box">
            <div class="modal-sistema-titulo" style="color:#d93025;">⚠️ Confirmación</div>
            <div class="modal-sistema-msg" id="msg-confirmacion"></div>
            <div class="modal-sistema-btns">
                <button onclick="cerrarConfirmacion(false)" class="btn-modal-secundario">Cancelar</button>
                <button onclick="cerrarConfirmacion(true)" class="btn-modal-peligro">¡Sí, seguro!</button>
            </div>
        </div>
    </div>

    <div id="modalAlerta" class="modal-sistema">
        <div class="modal-sistema-box">
            <div class="modal-sistema-titulo" style="color:#1a73e8;">ℹ️ Aviso</div>
            <div class="modal-sistema-msg" id="msg-alerta"></div>
            <div class="modal-sistema-btns">
                <button onclick="document.getElementById('modalAlerta').style.display='none'"
                        class="btn-modal-primario">Entendido</button>
            </div>
        </div>
    </div>

    <button class="btn-flotante-dark" id="btn-dark-mode" onclick="NavBar.toggleDarkMode()" title="Modo Oscuro">🌙</button>

    <script>
        // Indicador online/offline
        function actualizarDotConexion() {
            const dot = document.getElementById('nav-dot');
            if (dot) dot.classList.toggle('offline', !navigator.onLine);
        }
        window.addEventListener('online',  actualizarDotConexion);
        window.addEventListener('offline', actualizarDotConexion);
        actualizarDotConexion();

        // Badge de visitas pendientes de sincronizar
        function actualizarBadgePendientes(cantidad) {
            const badge = document.getElementById('badge-pendientes');
            if (!badge) return;
            if (cantidad > 0) { badge.textContent = cantidad + ' pendiente(s)'; badge.classList.add('visible'); }
            else { badge.classList.remove('visible'); }
        }

        // Auto-guardado del borrador del formulario
        let autoSaveTimer;
        function iniciarAutoSave() {
            clearTimeout(autoSaveTimer);
            autoSaveTimer = setTimeout(() => {
                const t = document.getElementById('tecnico')?.value;
                const g = document.getElementById('otroGimnasio')?.value;
                const m = document.getElementById('otroMotivo')?.value;
                if (t || g || m) {
                    localStorage.setItem('borrador_visita', JSON.stringify({ tecnico: t, otroGim: g, otroMotivo: m }));
                }
            }, 2000);
        }

        document.addEventListener('DOMContentLoaded', () => {
            // Restaurar borrador si existe
            try {
                const b = JSON.parse(localStorage.getItem('borrador_visita') || 'null');
                if (b) {
                    if (b.tecnico   && !document.getElementById('tecnico').value)
                        document.getElementById('tecnico').value = b.tecnico;
                    if (b.otroGim)   document.getElementById('otroGimnasio').value = b.otroGim;
                    if (b.otroMotivo) document.getElementById('otroMotivo').value  = b.otroMotivo;
                }
            } catch(e) {}
            ['tecnico','otroGimnasio','otroMotivo'].forEach(id => {
                document.getElementById(id)?.addEventListener('input', iniciarAutoSave);
            });
        });
    </script>
</body>
</html>
